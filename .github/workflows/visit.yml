name: Visit pages

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *" # every 30 minutes UTC

jobs:
  visit:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requests
        run: pip install requests

      - name: Visit pages
        run: python visit.py
